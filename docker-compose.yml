services:
  redis:
    image: docker.io/redis:7-alpine
    container_name: sparkorbit-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped

