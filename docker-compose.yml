services:
  redis:
    image: redis:8-alpine
    container_name: sparkorbit-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${SPARKORBIT_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sparkorbit-backend
    environment:
      SPARKORBIT_REDIS_URL: "redis://redis:6379/0"
      SPARKORBIT_BRIEFING_PROVIDER: "off"
    depends_on:
      - redis
    ports:
      - "8787:8787"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sparkorbit-worker
    command: ["/app/backend/docker/entrypoint-worker.sh"]
    environment:
      SPARKORBIT_REDIS_URL: "redis://redis:6379/0"
      SPARKORBIT_WORKER_POLL_INTERVAL: "2"
      SPARKORBIT_BRIEFING_PROVIDER: "off"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sparkorbit-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  redis-data:
